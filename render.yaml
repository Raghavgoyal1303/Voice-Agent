services:
  - type: web
    name: voice-agent
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node agent.js
    envVars:
      - key: MURF_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
