<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Agent | Tricity Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b; --surface: #18181b; --primary: #3b82f6;
            --danger: #ef4444; --text: #f4f4f5; --text-muted: #a1a1aa;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Outfit', sans-serif; background-color: var(--bg);
            color: var(--text); display: flex; justify-content: center;
            align-items: center; overflow: hidden;
        }
        .blob { position: absolute; filter: blur(80px); z-index: 0; opacity: 0.6; }
        .blob-1 { top: -10%; left: -10%; width: 400px; height: 400px; background: rgba(59,130,246,0.4); border-radius: 50%; }
        .blob-2 { bottom: -10%; right: -10%; width: 500px; height: 500px; background: rgba(139,92,246,0.3); border-radius: 50%; }
        .container {
            position: relative; z-index: 10; background: rgba(24,24,27,0.6);
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px; padding: 40px; text-align: center;
            width: 90%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        h1 { margin: 0 0 10px 0; font-size: 24px; font-weight: 600; }
        p { margin: 0 0 30px 0; color: var(--text-muted); font-size: 15px; }
        .avatar-container { position: relative; width: 120px; height: 120px; margin: 0 auto 30px auto; }
        .avatar {
            width: 100%; height: 100%; background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 48px; box-shadow: 0 0 30px rgba(59,130,246,0.5); z-index: 2; position: relative;
        }
        .ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; border: 2px solid var(--primary); opacity: 0; }
        .active-call .ring-1 { width: 140px; height: 140px; animation: pulse 2s infinite ease-out; }
        .active-call .ring-2 { width: 140px; height: 140px; animation: pulse 2s infinite 0.6s ease-out; }
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; } 100% { transform: translate(-50%, -50%) scale(1.8); opacity: 0; } }
        .btn {
            background: var(--primary); color: white; border: none; padding: 16px 32px;
            font-size: 16px; font-weight: 600; font-family: inherit; border-radius: 50px;
            cursor: pointer; transition: all 0.3s ease; width: 100%;
        }
        .btn:disabled { background: var(--surface); color: var(--text-muted); cursor: not-allowed; }
        .btn.end-call { background: var(--danger); display: none; }
        .status { margin-top: 20px; font-size: 14px; color: var(--text-muted); height: 20px; }
        .transcript-container {
            margin-top: 30px; max-height: 200px; overflow-y: auto; text-align: left;
            font-size: 14px; padding: 15px 5px; border-top: 1px solid rgba(255,255,255,0.1);
            display: none; scrollbar-width: none;
        }
        .transcript-container::-webkit-scrollbar { display: none; }
        .active-call .transcript-container { display: block; }
        .msg { margin-bottom: 12px; line-height: 1.4; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .msg-role { font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
        .msg-user .msg-role { color: var(--primary); }
        .msg-agent .msg-role { color: #8b5cf6; }
        .msg-content { color: var(--text); background: rgba(255,255,255,0.03); padding: 8px 12px; border-radius: 12px; display: inline-block; }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="container" id="app-container">
        <div class="avatar-container">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="avatar">✨</div>
        </div>
        <h1>Ken</h1>
        <p>Tricity Real Estate Assistant</p>
        <button id="btn-call" class="btn" disabled>Loading...</button>
        <button id="btn-end" class="btn end-call">End Call</button>
        <div id="status" class="status">Connecting to server...</div>
        <div id="transcript" class="transcript-container"></div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
